{% extends 'workshop/base.html' %}

{% block title %}Reset Password - HQ{% endblock %}

{% block content %}
<style>
    :root {
        --glass-bg: rgba(17, 25, 40, 0.75);
        --glass-border: rgba(255, 255, 255, 0.125);
        --hq-primary: #00d2ff;
        --hq-secondary: #3a7bd5;
    }

    body {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100vh;
    }

    .glass-card {
        background-color: var(--glass-bg);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .hq-label {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }

    .hq-input::placeholder {
        color: rgba(255, 255, 255, 0.35);
    }

    .hq-input {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid var(--glass-border) !important;
        color: white !important;
        border-radius: 12px !important;
        padding: 12px 16px !important;
        transition: all 0.3s ease;
    }

    .hq-input:focus {
        background: rgba(255, 255, 255, 0.1) !important;
        border-color: var(--hq-primary) !important;
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.3) !important;
    }

    .btn-hq {
        background: linear-gradient(45deg, var(--hq-secondary), var(--hq-primary));
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-hq:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
    }

    .icon-reset {
        background: linear-gradient(45deg, #28a745, #fff);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 3rem;
    }

    .spinner-border-sm {
        display: none;
    }

    .loading .spinner-border-sm {
        display: inline-block;
    }
    
    .loading .btn-text {
        display: none;
    }
</style>

<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-4 mt-5">
            <div class="text-center mb-4">
                <i class="bi bi-shield-check icon-reset"></i>
                <h2 class="text-white fw-bold mt-2 mb-0">RESET ACCESS</h2>
                <p class="text-white-50 small">Update your HQ secure credentials</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} border-0 glass-card mb-4 mt-0" style="background: rgba(220, 53, 69, 0.2); color: #ff8e8e;">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-shield-exclamation me-2 fs-5"></i>
                            <div class="small fw-bold">{{ message }}</div>
                        </div>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" id="resetForm" action="{% url 'owner_reset_password' %}">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="hq-label ms-1">6-DIGIT OTP</label>
                    <input type="text" name="otp" class="form-control hq-input text-center fw-bold" 
                           placeholder="••••••" maxlength="6" required autofocus>
                </div>

                <div class="mb-3">
                    <label class="hq-label ms-1">NEW HQ PASS</label>
                    <input type="password" name="new_password" class="form-control hq-input" 
                           placeholder="Min 8 characters" required>
                </div>

                <div class="mb-4">
                    <label class="hq-label ms-1">CONFIRM PASS</label>
                    <input type="password" name="confirm_password" class="form-control hq-input" 
                           placeholder="Re-enter password" required>
                </div>

                <button type="submit" class="btn btn-hq w-100 text-white" id="submitBtn">
                    <span class="btn-text">FINALIZE RESET</span>
                    <span class="spinner-border spinner-border-sm me-2"></span>
                    <span class="btn-text-loading" style="display:none;">UPDATING...</span>
                </button>
            </form>
        </div>
        <div class="text-center mt-4">
        </div>

    </div>
</div>
{% endblock %}
