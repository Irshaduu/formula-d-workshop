{% extends 'workshop/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">

        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-4">
                <h4 class="text-center mb-4">🔧 Staff Login</h4>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} shadow-sm d-flex align-items-center">
                            {% if message.tags == 'error' %}
                                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            {% endif %}
                            <div>{{ message }}</div>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" id="id_username" required autofocus>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" id="id_password" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Login</button>
                    </div>
                </form>

            </div>
        </div>

        <!-- Subtle link to Admin Portal for Owners -->
        <div class="text-center mt-5">
            <a href="{% url 'admin_login' %}" class="text-muted small text-decoration-none opacity-50"><i class="bi bi-shield-lock"></i> HQ </a>
        </div>

    </div>
</div>
{% endblock %}
