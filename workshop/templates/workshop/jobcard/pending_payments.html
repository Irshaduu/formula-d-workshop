{% extends 'workshop/base.html' %}

{% block title %}Pending Payments{% endblock %}

{% block content %}
<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
    <div>
        <h6 class="mb-0 text-danger fw-bold">
            <i class="bi bi-exclamation-octagon-fill"></i> Pending Bills
        </h6>
        <div class="text-muted small mt-1">Total Outstanding: <span class="fw-bold text-dark">₹{{ total_outstanding|floatformat:2 }}</span></div>
    </div>
    
    <!-- Tiny Search -->
    <form id="pendingSearchForm" style="min-width: 300px;">
        <div class="position-relative">
            <button type="submit" class="btn btn-link position-absolute top-50 start-0 translate-middle-y p-0 ms-3 text-muted" style="z-index: 5; border: none; text-decoration: none;">
                <i class="bi bi-search opacity-50" style="font-size: 0.8rem;"></i>
            </button>
            <input type="text" id="pendingSearch" name="q" class="form-control border-0 shadow-sm ps-5" 
                placeholder="Search Reg or Name..." 
                style="border-radius: 999px; background: var(--color-card); font-size: 0.85rem;" 
                value="{{ q }}">
        </div>
    </form>
</div>

<!-- Results Container -->
<div id="pendingResultsContainer">
    {% include "workshop/jobcard/pending_payments_partial.html" %}
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const input = document.getElementById('pendingSearch');
        const searchForm = document.getElementById('pendingSearchForm');
        const resultsContainer = document.getElementById('pendingResultsContainer');
        let debounceTimer;

        function updateResults(q, page = 1, event = null) {
            if (event && event.type === 'submit') event.preventDefault();
            const url = new URL(window.location.href);
            url.searchParams.set('q', q);
            url.searchParams.set('page', page);

            const delay = (event && event.type === 'submit') ? 0 : 300;
            if (debounceTimer) clearTimeout(debounceTimer);

            debounceTimer = setTimeout(() => {
                fetch(url, {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(res => res.text())
                .then(html => {
                    resultsContainer.innerHTML = html;
                    window.history.pushState({}, '', url);
                })
                .catch(err => console.error('Search error:', err));
            }, delay);
        }

        input.addEventListener('input', function() {
            updateResults(this.value);
        });

        searchForm.addEventListener('submit', function(e) {
            updateResults(input.value, 1, e);
        });

        resultsContainer.addEventListener('click', function(e) {
            const link = e.target.closest('.page-link');
            if (link && !link.parentElement.classList.contains('disabled')) {
                e.preventDefault();
                const url = new URL(link.href);
                const page = url.searchParams.get('page');
                updateResults(input.value, page);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    });
</script>

<style>
    .job-card {
        background-color: var(--color-card);
        border: 1px solid var(--color-border);
        border-radius: 12px;
        transition: transform 0.2s;
    }
    .job-card:hover {
        transform: translateY(-3px);
    }
    .reg-badge {
        background: var(--color-hover);
        color: var(--color-primary);
        border: 1px solid var(--color-primary);
        border-radius: 6px;
        display: inline-block;
        font-size: 0.8rem;
    }
</style>
{% endblock %}
