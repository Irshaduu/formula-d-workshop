{% extends 'workshop/base.html' %}

{% block title %}Pending Payments{% endblock %}

{% block extra_css %}
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
{% endblock %}

{% block content %}

<style>
    :root {
        --font-display: 'Barlow Condensed', sans-serif;
        --font-body:    'Barlow', sans-serif;
        --pp-red:       #dc2626;
        --pp-amber:     #d97706;
    }

    /* ── Page Header ─────────────────────────────── */
    .pp-page-header {
        margin-bottom: 1.5rem;
        margin-top: 0.5rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid var(--color-border);
        position: relative;
    }

    .pp-page-header::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 48px;
        height: 2px;
        background: var(--pp-red);
    }

    .pp-header-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 12px;
        flex-wrap: wrap;
    }

    /* Title block */
    .pp-title-block {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .pp-page-title {
        font-family: var(--font-display);
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: -0.3px;
        color: var(--pp-red);
        line-height: 1;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    /* Outstanding amount block */
    .pp-outstanding-block {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 2px;
    }

    .pp-outstanding-label {
        font-family: var(--font-body);
        font-size: 0.62rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: #94a3b8;
    }

    .pp-outstanding-amount {
        font-family: var(--font-display);
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--pp-red);
        line-height: 1;
    }

    /* ── Search ─────────────────────────────────── */
    .pp-search-wrap {
        position: relative;
        flex: 1;
        min-width: 0;
    }

    .pp-search-wrap .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--color-text-muted);
        font-size: 0.75rem;
        pointer-events: none;
    }

    .pp-search-input {
        width: 100%;
        border: 1px solid var(--color-border);
        border-radius: 999px;
        background: var(--color-card);
        font-family: var(--font-body);
        font-size: 0.8rem;
        color: var(--color-text);
        padding: 7px 14px 7px 32px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
        box-shadow: 0 1px 3px var(--color-shadow);
    }

    .pp-search-input:focus {
        border-color: var(--pp-red);
        box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
    }

    .pp-search-input::placeholder { color: var(--color-text-muted); }
</style>

<div class="pp-page-header">
    <div class="pp-header-top">
        <!-- Title -->
        <div class="pp-title-block">
            <div class="pp-page-title">
                <i class="bi bi-exclamation-octagon-fill"></i>
                Pending Bills
            </div>
        </div>

        <!-- Outstanding total -->
        <div class="pp-outstanding-block">
            <span class="pp-outstanding-label">Total Outstanding</span>
            <span class="pp-outstanding-amount">₹{{ total_outstanding|floatformat:2 }}</span>
        </div>
    </div>

    <!-- Search -->
    <div class="pp-search-wrap">
        <form id="pendingSearchForm">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="pendingSearch" name="q"
                   class="pp-search-input"
                   placeholder="Search registration, customer, brand or model…"
                   value="{{ q }}" autocomplete="off">
        </form>
    </div>
</div>

<div id="pendingResultsContainer">
    {% include "workshop/jobcard/pending_payments_partial.html" %}
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const input            = document.getElementById('pendingSearch');
    const searchForm       = document.getElementById('pendingSearchForm');
    const resultsContainer = document.getElementById('pendingResultsContainer');
    let debounceTimer;

    function updateResults(q, page = 1, event = null) {
        if (event && event.type === 'submit') event.preventDefault();
        const url = new URL(window.location.href);
        url.searchParams.set('q', q);
        url.searchParams.set('page', page);
        const delay = (event && event.type === 'submit') ? 0 : 300;
        if (debounceTimer) clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
                .then(res => res.text())
                .then(html => {
                    resultsContainer.innerHTML = html;
                    window.history.pushState({}, '', url);
                })
                .catch(err => console.error('Search error:', err));
        }, delay);
    }

    input.addEventListener('input', function () { updateResults(this.value); });
    searchForm.addEventListener('submit', function (e) { updateResults(input.value, 1, e); });

    resultsContainer.addEventListener('click', function (e) {
        const link = e.target.closest('.page-link');
        if (link && !link.parentElement.classList.contains('disabled')) {
            e.preventDefault();
            const url = new URL(link.href);
            updateResults(input.value, url.searchParams.get('page'));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });
});
</script>

{% endblock %}
