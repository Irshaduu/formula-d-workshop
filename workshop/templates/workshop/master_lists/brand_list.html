{% extends 'workshop/base.html' %}

{% block title %}Car Brands{% endblock %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col">
        <h4 class="mb-0 text-secondary">Car Brands</h4>
    </div>
    <div class="col-auto">
        <a href="{% url 'brand_add' %}" class="btn btn-primary fw-bold">
            + Add
        </a>
    </div>
</div>

<div class="row g-3">
    {% for brand in brands %}
    <div class="col-6 col-md-4 col-lg-3">
        <div class="card shadow-sm border-0 h-100 text-center hover-up position-relative group" style="overflow: visible !important;">
            <!-- Action Dropdown (3 Dots) -->
            <div class="position-absolute top-0 end-0 p-2" style="z-index: 200;">
                <div class="dropdown">
                    <button class="btn btn-sm btn-light rounded-circle shadow-sm border transition-all" 
                            type="button" data-bs-toggle="dropdown" aria-expanded="false" 
                            data-bs-boundary="viewport"
                            style="width: 24px; height: 24px; padding: 0; font-size: 0.75rem; background: white;">
                        <i class="bi bi-three-dots-vertical"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-1 small" style="min-width: 100px;">
                        <li>
                            <a class="dropdown-item py-1" href="{% url 'brand_edit' brand.id %}">
                                <i class="bi bi-pencil me-2 text-primary"></i> Edit
                            </a>
                        </li>
                        <li><hr class="dropdown-divider my-1"></li>
                        <li>
                            <a class="dropdown-item py-1 text-danger" href="{% url 'brand_delete' brand.id %}">
                                <i class="bi bi-trash me-2"></i> Delete
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <a href="{% url 'brand_model_list' brand.id %}" class="text-decoration-none h-100">
                <div class="card-body p-3 d-flex flex-column align-items-center justify-content-center"
                    style="min-height: 120px;">
                    {% if brand.logo_image %}
                    <img src="{{ brand.logo_image.url }}" alt="{{ brand.name }}" class="img-fluid mb-2"
                        style="max-height: 60px;">
                    {% else %}
                    <div class="display-6 text-muted mb-2">
                        <i class="bi bi-car-front"></i>
                    </div>
                    {% endif %}
                    <h6 class="fw-bold text-dark mb-0">{{ brand.name }}</h6>
                </div>
            </a>
        </div>
    </div>

    {% empty %}
    <div class="col-12 text-center py-5">
        <p class="text-muted">No brands added yet.</p>
    </div>
    {% endfor %}
</div>

<style>
    .transition-all {
        transition: all 0.2s ease-in-out;
    }
</style>
{% endblock %}
