{% extends 'workshop/base.html' %}

{% block title %}Delete Brand{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-danger mt-5" style="border-width: 2px;">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle-fill text-danger display-1 mb-4"></i>
                <h4 class="mb-3">Delete Brand?</h4>
                <p class="text-muted mb-4">
                    Are you sure you want to delete <strong>"{{ brand.name }}"</strong>?<br>
                    <span class="text-danger small fw-bold">Warning: This will also delete all car models associated with this brand.</span>
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg fw-bold">Yes, Delete Brand</button>
                        <a href="{% url 'brand_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
