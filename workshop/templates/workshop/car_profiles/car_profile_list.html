{% extends 'workshop/base.html' %}
{% load static %}

{% block title %}Car Profiles{% endblock %}

{% block content %}
<div class="container-fluid px-3 py-3">
    <!-- Header with Tiny Search -->
    <div class="d-flex justify-content-between align-items-center mb-3 gap-3">
        <h6 class="mb-0 text-primary fw-bold flex-shrink-0" style="font-size: 0.85rem;">
            <i class="bi bi-clock-history"></i> Car Profiles ({{ page_obj.paginator.count }})
        </h6>
        
        <!-- Search Bar (Super Tiny Pattern) -->
        <form id="carSearchForm" class="d-flex flex-grow-1" style="max-width: 500px;">
            <!-- Text Search -->
            <div class="position-relative flex-grow-1">
                <button type="submit" class="btn btn-link position-absolute top-50 start-0 translate-middle-y p-0 ms-2 text-muted" style="z-index: 5; border: none; text-decoration: none;">
                    <i class="bi bi-search" style="font-size: 0.8rem;"></i>
                </button>
                <input type="text" name="q" id="carSearchInput" value="{{ search_query|default:'' }}" 
                       placeholder="Search Reg, Owner, Brand, Model..." 
                       class="form-control form-control-sm ps-4 rounded-pill border-0 shadow-sm"
                       style="font-size: 0.85rem; height: 32px; background: var(--color-card);"
                       autocomplete="off">
            </div>
        </form>
    </div>

    <!-- Car List Container (AJAX Target) -->
    <div id="car-list-container" class="position-relative">
        {% include 'workshop/car_profiles/car_list_partial.html' %}
    </div>
</div>

<style>
    /* Premium Car Card Styling */
    .car-card {
        display: block;
        background: var(--color-card);
        border: 1px solid var(--color-border);
        border-radius: 16px;
        padding: 1.25rem;
        text-decoration: none;
        color: inherit;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        height: 100%;
    }

    .car-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 24px var(--color-shadow) !important;
        border-color: var(--color-primary);
        text-decoration: none;
        color: inherit;
    }

    .car-name {
        color: var(--color-primary);
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        line-height: 1.3;
        word-break: break-word;
    }

    /* Empty State Match Jobs Card */
    .empty-state i {
        font-size: 4rem;
        opacity: 0.15;
        color: var(--color-primary);
    }

    /* Mobile Adjustments */
    @media (max-width: 768px) {
        .car-card {
            padding: 1rem;
        }
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('carSearchInput');
    const searchForm = document.getElementById('carSearchForm');
    const container = document.getElementById('car-list-container');
    let timeout = null;

    function performSearch(event) {
        if (event && event.type === 'submit') event.preventDefault();
        const query = searchInput.value.trim();
        
        if (timeout) clearTimeout(timeout);
        
        const delay = (event && event.type === 'submit') ? 0 : 300;
        
        timeout = setTimeout(() => {
            const url = new URL(window.location.href);
            url.searchParams.set('q', query);
            url.searchParams.set('page', '1');
            
            container.style.opacity = '0.5';
            
            fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const newContent = doc.getElementById('car-list-container') || doc.body;
                    
                    if (newContent) {
                        container.innerHTML = newContent.innerHTML;
                        
                        // Update the count in the header
                        const newCountEl = doc.getElementById('car-count-data');
                        if (newCountEl) {
                            const newCount = newCountEl.getAttribute('data-count');
                            const countHeader = document.querySelector('h6 i.bi-clock-history').parentElement;
                            if (countHeader) {
                                countHeader.innerHTML = `<i class="bi bi-clock-history"></i> Car Profiles (${newCount})`;
                            }
                        }
                    }
                    container.style.opacity = '1';
                    window.history.pushState({}, '', url);
                })
                .catch(err => {
                    console.error('Search failed:', err);
                    container.style.opacity = '1';
                });
        }, delay);
    }

    if (searchInput) searchInput.addEventListener('input', performSearch);
    if (searchForm) searchForm.addEventListener('submit', performSearch);
});
</script>
{% endblock %}
