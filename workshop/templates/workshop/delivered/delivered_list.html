{% extends "workshop/base.html" %}

{% block title %}Delivered Vehicles{% endblock %}

{% block content %}
<div class="inventory-dark-wrapper" style="background: transparent; padding: 0;">
    <div class="d-flex justify-content-between align-items-center mb-4 gap-3">
        <h1 class="mb-0 fw-bold h4">Delivered Vehicles</h1>
        
        <!-- Tiny Search -->
        <div class="flex-grow-1" style="max-width: 400px;">
            <div class="position-relative">
                <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted opacity-50"></i>
                <input type="text" id="deliveredSearch" class="form-control form-control-lg border-0 shadow-sm ps-5" 
                    placeholder="Search Registration, Brand, or Customer..." 
                    style="border-radius: 999px; background: var(--color-card); font-size: 0.85rem;" 
                    value="{{ q }}">
            </div>
        </div>

        <div class="d-flex gap-2">
            <!-- Date Filter Dropdown -->
            <div class="dropdown">
                <button id="filterDropdownBtn" class="btn btn-sm btn-outline-secondary dropdown-toggle d-flex align-items-center gap-2 px-3 py-2 border-0 shadow-sm" type="button"
                    data-bs-toggle="dropdown" style="border-radius: 999px; background: var(--color-card);">
                    <i class="bi bi-funnel"></i>
                    <span id="filterLabel">
                        {% if filter_type == 'today' %}Today
                        {% elif filter_type == 'week' %}1 Week
                        {% elif filter_type == 'month' %}1 Month
                        {% elif filter_type == 'year' %}1 Year
                        {% elif filter_type == 'custom' %}{% if start_date and end_date %}{{ start_date }} - {{ end_date }}{% else %}Custom{% endif %}
                        {% else %}All{% endif %}
                    </span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2" style="border-radius: 16px;">
                    <li><a class="dropdown-item py-2 px-3 {% if filter_type == 'today' %}active{% endif %}" href="?filter=today">Today</a></li>
                    <li><a class="dropdown-item py-2 px-3 {% if filter_type == 'week' %}active{% endif %}" href="?filter=week">1 Week</a></li>
                    <li><a class="dropdown-item py-2 px-3 {% if filter_type == 'month' %}active{% endif %}" href="?filter=month">1 Month</a></li>
                    <li><a class="dropdown-item py-2 px-3 {% if filter_type == 'year' %}active{% endif %}" href="?filter=year">1 Year</a></li>
                    <li><a class="dropdown-item py-2 px-3 {% if filter_type == 'all' %}active{% endif %}" href="?filter=all">All</a></li>
                    <li><hr class="dropdown-divider mx-3"></li>
                    <li>
                        <a id="customRangeToggle" class="dropdown-item py-2 px-3 {% if filter_type == 'custom' %}active{% endif %}" href="#">Custom Range</a>
                    </li>
                    <li id="customDatePicker" style="display: {% if filter_type == 'custom' %}block{% else %}none{% endif %};" onclick="event.stopPropagation()">
                        <div class="px-3 py-2">
                            <form id="customDateForm" method="get" class="d-flex flex-column gap-2">
                                <input type="hidden" name="filter" value="custom">
                                <label class="small text-muted mb-0">Start Date</label>
                                <input type="date" name="start_date" id="start_date" class="form-control form-control-sm" value="{{ start_date }}" required>
                                <label class="small text-muted mb-0">End Date</label>
                                <input type="date" name="end_date" id="end_date" class="form-control form-control-sm" value="{{ end_date }}" required>
                                <button type="submit" class="btn btn-primary btn-sm rounded-pill mt-1">Apply Range</button>
                            </form>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Results Container -->
    <div id="resultsContainer">
        {% include "workshop/delivered/delivered_list_partial.html" %}
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const input = document.getElementById('deliveredSearch');
        const resultsContainer = document.getElementById('resultsContainer');
        let currentFilter = '{{ filter_type }}';
        let debounceTimer;

        function updateResults(q, page = 1) {
            const url = new URL(window.location.href);
            url.searchParams.set('q', q);
            url.searchParams.set('filter', currentFilter);
            url.searchParams.set('page', page);

            // Preserve custom date range if active
            if (currentFilter === 'custom') {
                const startDate = document.getElementById('start_date').value;
                const endDate = document.getElementById('end_date').value;
                if (startDate) url.searchParams.set('start_date', startDate);
                if (endDate) url.searchParams.set('end_date', endDate);
            } else {
                url.searchParams.delete('start_date');
                url.searchParams.delete('end_date');
            }

            // Update Label text
            const labelMap = {
                'today': 'Today',
                'week': '1 Week',
                'month': '1 Month',
                'year': '1 Year',
                'all': 'All'
            };
            const label = document.getElementById('filterLabel');
            if (label) {
                if (currentFilter === 'custom') {
                    const startDate = document.getElementById('start_date').value;
                    const endDate = document.getElementById('end_date').value;
                    label.textContent = (startDate && endDate) ? `${startDate} - ${endDate}` : 'Custom';
                } else if (labelMap[currentFilter]) {
                    label.textContent = labelMap[currentFilter];
                }
            }

            // Sync Dropdown Active Class
            document.querySelectorAll('.dropdown-menu a.dropdown-item').forEach(item => {
                const href = item.getAttribute('href');
                if (href && href.includes('filter=')) {
                    const params = new URLSearchParams(href.split('?')[1]);
                    if (params.get('filter') === currentFilter) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                }
            });

            fetch(url, {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(res => res.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const newContent = doc.body.innerHTML;
                resultsContainer.innerHTML = newContent;
                
                // Update URL without reload
                window.history.pushState({}, '', url);
            })
            .catch(err => console.error('Search error:', err));
        }

        input.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                updateResults(this.value);
            }, 300);
        });

        // Handle pagination clicks within the partial
        resultsContainer.addEventListener('click', function(e) {
            const link = e.target.closest('.page-link');
            if (link && !link.parentElement.classList.contains('disabled')) {
                e.preventDefault();
                const url = new URL(link.href);
                const page = url.searchParams.get('page');
                const q = input.value || ''; // Get current search query
                updateResults(q, page);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        // Update currentFilter when filter dropdown items are clicked
        document.querySelectorAll('.dropdown-menu a.dropdown-item').forEach(item => {
            item.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href.includes('filter=')) {
                    const params = new URLSearchParams(href.split('?')[1]);
                    const newFilter = params.get('filter');
                    
                    if (newFilter && newFilter !== 'custom') { 
                        e.preventDefault();
                        currentFilter = newFilter;
                        updateResults(input.value);
                    }
                }
            });
        });

        // Close the dropdown when clicking the "Custom Range" link
        const customToggle = document.getElementById('customRangeToggle');
        if (customToggle) {
            customToggle.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                const picker = document.getElementById('customDatePicker');
                if (picker) {
                    picker.style.display = (picker.style.display === 'none') ? 'block' : 'none';
                }
            });
        }

        // Handle the custom date form submission
        const customForm = document.getElementById('customDateForm');
        if (customForm) {
            customForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const startDate = document.getElementById('start_date').value;
                const endDate = document.getElementById('end_date').value;
                
                if (startDate && endDate) {
                    currentFilter = 'custom';
                    updateResults(input.value, 1);
                    
                    // Close the dropdown (specifically the date filter one)
                    const dropdownEl = document.getElementById('filterDropdownBtn');
                    const dropdown = bootstrap.Dropdown.getInstance(dropdownEl);
                    if (dropdown) dropdown.hide();
                }
            });
        }
    });
</script>

<style>
    .card {
        border: 1px solid var(--color-border) !important;
        transition: transform 0.2s, box-shadow 0.2s;
        border-radius: 16px;
    }
    .hover-up:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.12) !important;
    }
    .reg-badge {
        background-color: var(--color-primary) !important;
        color: white !important;
        padding: 0.25rem 0.6rem !important;
        font-weight: 700 !important;
        font-size: 0.75rem !important;
        letter-spacing: 0.5px !important;
        border-radius: 6px;
    }
</style>
{% endblock %}
