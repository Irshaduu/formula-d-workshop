{% load humanize %}
{% for payment in recent_payments %}
<div class="pay-row">
  <div>
    <div class="fw-bold text-success d-flex align-items-center gap-2" style="font-size:1.05rem;">
      ₹{{ payment.amount|floatformat:"0"|intcomma }}
        <span class="badge bg-primary" style="font-size:0.65rem;">Bulk Pay</span>
    </div>
    <div class="small text-muted">
      {{ payment.date|date:"d M Y" }}
      {% if payment.note %} · <i class="bi bi-chat-text"></i> {{ payment.note }}{% endif %}
    </div>
  </div>
  <div class="d-flex align-items-center gap-2">
    <span class="pay-method-badge">{{ payment.payment_method }}</span>
    <form method="post" action="{% url 'delete_shop_payment' shop.id payment.id %}"
          onsubmit="confirmSubmit(event, 'Reverse this <strong class=\'text-danger\'>₹{{ payment.amount|floatformat:0 }}</strong> payment?', this, 'danger', 'bi-arrow-counterclockwise');">
      {% csrf_token %}
      <button type="submit" class="btn btn-sm btn-light text-danger rounded-circle" style="width:28px;height:28px;padding:0;">
        <i class="bi bi-trash3" style="font-size:0.75rem;"></i>
      </button>
    </form>
  </div>
</div>
{% endfor %}
