{% extends 'workshop/base.html' %}
{% block title %}Add Supplies Shop{% endblock %}
{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow-sm border-0" style="border-radius: 16px;">
        <div class="card-body p-4 p-md-5">
            <h2 class="fw-bold mb-4" style="color: var(--color-primary);">Add Supplies Shop</h2>
            <form method="post" action="">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label fw-bold">Shop Name *</label>
                    <input type="text" name="name" class="form-control form-control-lg bg-light border-0" required placeholder="e.g. PartsMaster Auto">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Phone Number</label>
                    <input type="text" name="phone" class="form-control form-control-lg bg-light border-0" placeholder="Optional">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Address</label>
                    <textarea name="address" class="form-control form-control-lg bg-light border-0" rows="3" placeholder="Optional"></textarea>
                </div>
                <div class="d-flex gap-2 pt-2">
                    <a href="{% url 'supplier_shop_list' %}" class="btn btn-outline-secondary btn-lg fw-bold rounded-pill px-4">Cancel</a>
                    <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill px-5 flex-grow-1">Create Shop</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
